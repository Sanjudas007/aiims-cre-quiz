<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTONC - AIIMS CRE CBT</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="card">

<h1>RTONC</h1>

<h2>AIIMS CRE 2026 CBT</h2>

<input
type="text"
id="name"
placeholder="Candidate Name">

<input
type="email"
id="email"
placeholder="Email Address">

<select id="exam">

<option>AIIMS CRE 2026</option>

<option>AIIMS Nursing Officer</option>

<option>ESIC</option>

<option>PGIMER</option>

</select>

<div class="info">

<p>Questions : 100</p>

<p>Time : 90 Minutes</p>

<p>Marks : 400</p>

<p>Negative Marking : Yes</p>

</div>

<button onclick="startTest()"
  window.location="exam.html";>

Start Test

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
